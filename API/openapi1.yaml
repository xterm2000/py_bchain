schemes:
- https
- http
paths:
  /client/findByName:
    get:
      tags:
      - client
      summary: find client by name
      description: client will be found by name
      operationId: findClientByName
      consumes:
      - application/json
      - application/xml
      produces:
      - application/json
      - application/xml
      parameters:
      - name: name
        in: query
        description: names for filter
        required: true
        type: string
      responses:
        '200':
          description: success
          schema:
            $ref: '#/definitions/Client'
        400:
          description: Bad request
          schema:
            $ref: '#/definitions/Error'    # <-----
        404:
          description: Not found
          schema:
            $ref: '#/definitions/UnauthorizedError'    # <-----
      security:
      - basicAuth: []
  /blocks/addblock:
    post:
      tags:
       - block
      responses:
        200:
          description: Ok
  /ping:
    get:
      summary: test server 
      description: simple ping is sent 
      responses:
        200:
          description: OK

  
